name: PR — build, release, test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{github.ref}}
  cancel-in-progress: true

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{github.repository}}:sha-${{github.sha}}
            ghcr.io/${{github.repository}}:pr-${{github.event.number}}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm dependency update chart
          helm package chart --version 0.0.0-pr${{github.event.number}} --app-version sha-${{github.sha}}

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz replicated
          sudo mv replicated /usr/local/bin/

      - name: Create release
        run: |
          replicated release create \
            --version "0.0.0-pr${{github.event.number}}" \
            --promote pr-${{github.head_ref}} \
            --auto

  test:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz replicated
          sudo mv replicated /usr/local/bin/

      - name: Create test cluster
        run: |
          replicated cluster create \
            --distribution kind \
            --version 1.33 \
            --instance-type r1.small \
            --ttl 1h \
            --name "k8laude-pr-${{github.event.number}}" \
            --wait 5m

      - name: Get kubeconfig
        run: |
          replicated cluster kubeconfig --name "k8laude-pr-${{github.event.number}}" \
            --output-path /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Install app and test
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.crds.yaml
          helm dependency update chart
          helm install k8laude chart -n k8laude --create-namespace \
            --set image.tag=sha-${{github.sha}} \
            --set image.pullPolicy=Always \
            --set ingress.enabled=false \
            --set cert-manager.enabled=false \
            --set traefik.enabled=false \
            --wait --timeout 5m

          # Verify healthz
          kubectl exec -n k8laude k8laude-0 -c claude -- curl -sf http://localhost:7681/healthz

      - name: Cleanup cluster
        if: always()
        run: |
          replicated cluster rm --name "k8laude-pr-${{github.event.number}}" || true
