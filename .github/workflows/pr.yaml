name: PR — build, release, test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{github.ref}}
  cancel-in-progress: true

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5-43

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}:sha-${{github.sha}}
            ghcr.io/${{github.repository}}:pr-${{github.event.number}}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart and prepare release
        run: |
          helm dependency update chart
          mkdir -p /tmp/release
          helm package chart \
            --version 0.0.0-pr${{github.event.number}} \
            --app-version sha-${{github.sha}} \
            -d /tmp/release
          for f in replicated/*.yaml; do
            sed "s/chartVersion: .*/chartVersion: \"0.0.0-pr${{github.event.number}}\"/" "$f" > /tmp/release/$(basename "$f")
          done

      - name: Create release
        uses: replicatedhq/replicated-actions/create-release@main
        with:
          app-slug: k8laude
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          yaml-dir: /tmp/release
          version: 0.0.0-pr${{github.event.number}}
          promote-channel: pr-${{github.head_ref}}

  test:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create test cluster
        id: cluster
        uses: replicatedhq/replicated-actions/create-cluster@main
        with:
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          kubernetes-distribution: kind
          kubernetes-version: "1.33"
          cluster-name: k8laude-pr-${{github.event.number}}
          ttl: 1h
          timeout-minutes: 10

      - name: Write kubeconfig
        run: echo "${{steps.cluster.outputs.cluster-kubeconfig}}" > /tmp/kubeconfig.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install app and test
        env:
          KUBECONFIG: /tmp/kubeconfig.yaml
        run: |
          kubectl create namespace demo
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{github.actor}} \
            --docker-password=${{secrets.GITHUB_TOKEN}} \
            -n demo

          helm dependency update chart
          helm install k8laude chart -n demo \
            --set image.tag=sha-${{github.sha}} \
            --set image.pullPolicy=Always \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set ingress.enabled=false \
            --set cert-manager.enabled=false \
            --set traefik.enabled=false \
            --wait --timeout 15m

          kubectl exec -n demo k8laude-0 -c claude -- curl -sf http://localhost:3000/healthz

      - name: Cleanup cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@main
        with:
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          cluster-id: ${{steps.cluster.outputs.cluster-id}}
