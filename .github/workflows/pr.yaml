name: PR — build, release, test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{github.ref}}
  cancel-in-progress: true

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}:sha-${{github.sha}}
            ghcr.io/${{github.repository}}:pr-${{github.event.number}}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm dependency update chart
          helm package chart \
            --version 0.0.0-pr${{github.event.number}} \
            --app-version sha-${{github.sha}} \
            -d /tmp/chart-package

      - name: Create release
        uses: replicatedhq/replicated-actions/create-release@main
        with:
          app-slug: k8laude
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          chart: /tmp/chart-package/k8laude-0.0.0-pr${{github.event.number}}.tgz
          yaml-dir: replicated
          version: 0.0.0-pr${{github.event.number}}
          promote-channel: pr-${{github.head_ref}}

  test:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Create test cluster
        id: cluster
        uses: replicatedhq/replicated-actions/create-cluster@main
        with:
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          kubernetes-distribution: kind
          kubernetes-version: "1.33"
          cluster-name: k8laude-pr-${{github.event.number}}
          ttl: 1h

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install app and test
        env:
          KUBECONFIG: ${{steps.cluster.outputs.cluster-kubeconfig-path}}
        run: |
          helm dependency update chart
          helm install k8laude chart -n demo --create-namespace \
            --set image.tag=sha-${{github.sha}} \
            --set image.pullPolicy=Always \
            --set ingress.enabled=false \
            --set cert-manager.enabled=false \
            --set traefik.enabled=false \
            --wait --timeout 5m

          kubectl exec -n demo k8laude-0 -c claude -- curl -sf http://localhost:7681/healthz

      - name: Cleanup cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@main
        with:
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          cluster-id: ${{steps.cluster.outputs.cluster-id}}
