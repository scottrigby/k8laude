name: Release — build, release, promote

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Set version
        id: version
        run: |
          VERSION="0.1.0-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{github.repository}}:${{steps.version.outputs.version}}
            ghcr.io/${{github.repository}}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm dependency update chart
          helm package chart \
            --version ${{steps.version.outputs.version}} \
            --app-version ${{steps.version.outputs.version}}

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL | tar xz replicated
          sudo mv replicated /usr/local/bin/

      - name: Create release and promote to Unstable
        run: |
          replicated release create \
            --version "${{steps.version.outputs.version}}" \
            --promote Unstable \
            --release-notes "Automated release from main (${{github.sha}})" \
            --auto
