name: Release — build, release, promote

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push: use the tag as version (strip 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Branch push: use timestamp-sha format
            VERSION="0.1.0-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine channel
        id: channel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG" == *-* ]]; then
              # Pre-release tag (e.g., 1.0.0-alpha, 1.0.0-rc.1) → Beta
              echo "channel=Beta" >> $GITHUB_OUTPUT
            else
              # Stable tag (e.g., 1.0.0) → Stable
              echo "channel=Stable" >> $GITHUB_OUTPUT
            fi
          else
            # Branch push → Unstable
            echo "channel=Unstable" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push k8laude image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}:${{steps.version.outputs.version}}
            ghcr.io/${{github.repository}}:latest

      - name: Build and push k8laude-cloudtty image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: chart/charts/cloudtty/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}-cloudtty:${{steps.version.outputs.version}}
            ghcr.io/${{github.repository}}-cloudtty:latest

      - name: Build and push k8laude-code-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: chart/charts/code-server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}-code-server:${{steps.version.outputs.version}}
            ghcr.io/${{github.repository}}-code-server:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart and prepare release
        run: |
          helm dependency update chart
          mkdir -p /tmp/release
          helm package chart \
            --version ${{steps.version.outputs.version}} \
            --app-version ${{steps.version.outputs.version}} \
            -d /tmp/release
          # Copy KOTS manifests and inject chart version
          for f in replicated/*.yaml; do
            sed "s/chartVersion: .*/chartVersion: \"${{steps.version.outputs.version}}\"/" "$f" > /tmp/release/$(basename "$f")
          done

      - name: Create release and promote
        uses: replicatedhq/replicated-actions/create-release@main
        with:
          app-slug: k8laude
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          yaml-dir: /tmp/release
          version: ${{steps.version.outputs.version}}
          promote-channel: ${{steps.channel.outputs.channel}}
          release-notes: |
            ${{steps.channel.outputs.channel == 'Unstable' && format('Automated release from main ({0})', github.sha) || format('Release {0}', steps.version.outputs.version)}}
