name: Release — build, release, promote

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPLICATED_APP: k8laude
  REPLICATED_API_TOKEN: ${{secrets.REPLICATED_API_TOKEN}}

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Set version
        id: version
        run: |
          VERSION="0.1.0-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{github.repository}}:${{steps.version.outputs.version}}
            ghcr.io/${{github.repository}}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm dependency update chart
          helm package chart \
            --version ${{steps.version.outputs.version}} \
            --app-version ${{steps.version.outputs.version}} \
            -d /tmp/chart-package

      - name: Create release and promote to Unstable
        uses: replicatedhq/replicated-actions/create-release@main
        with:
          app-slug: k8laude
          api-token: ${{secrets.REPLICATED_API_TOKEN}}
          chart: /tmp/chart-package/k8laude-${{steps.version.outputs.version}}.tgz
          version: ${{steps.version.outputs.version}}
          promote-channel: Unstable
          release-notes: "Automated release from main (${{github.sha}})"
