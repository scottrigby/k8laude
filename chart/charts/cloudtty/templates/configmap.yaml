apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-cloudtty-scripts
  labels:
    app.kubernetes.io/name: cloudtty
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  start.sh: |
    #!/bin/bash
    set -e

    echo "=== CloudTTY Web Terminal ==="

    echo "Starting ttyd on port 7682, proxy on port {{ .Values.service.port }}..."

    # Entry script: kubectl exec into the Claude pod
    # $1 = session ID from ttyd --url-arg
    cat > /tmp/cloudtty-entry.sh << 'ENTRY'
    #!/bin/bash
    SESSION_ID="$1"
    NOTIFY_HOST="{{ .Release.Name }}-cloudtty"
    exec kubectl exec -it {{ .Release.Name }}-0 -c claude -- \
      env CLOUDTTY_SESSION="$SESSION_ID" \
          CLOUDTTY_NOTIFY_HOST="$NOTIFY_HOST" \
          CLOUDTTY_NOTIFY_PORT="{{ .Values.service.port }}" \
          CLOUDTTY_BASE_PATH="{{ .Values.basePath }}" \
          TERM=xterm-256color \
          COLORTERM=truecolor \
      bash -c 'export PATH=/tmp/cloudtty-bin:$PATH; source ~/.bashrc 2>/dev/null; exec {{ .Values.command }}'
    ENTRY
    chmod +x /tmp/cloudtty-entry.sh

    ttyd \
      --writable \
      --port 7682 \
      --ping-interval 30 \
      {{- if .Values.auth.password }}
      --credential "k8laude:{{ .Values.auth.password }}" \
      {{- end }}
      --url-arg \
      /tmp/cloudtty-entry.sh &

    sleep 2
    exec node /scripts/server.js

  server.js: |
    const http = require('http');
    const { URL } = require('url');
    const fs = require('fs');

    const PROXY_PORT = {{ .Values.service.port }};
    const TTYD_PORT = 7682;
    const BASE_PATH = '{{ .Values.basePath }}';

    const sseClients = new Map(); // sessionId -> Set<res>
    const notifications = [];

    function addSSEClient(sessionId, res) {
      const key = sessionId || 'global';
      if (!sseClients.has(key)) sseClients.set(key, new Set());
      sseClients.get(key).add(res);
    }

    function removeSSEClient(sessionId, res) {
      const key = sessionId || 'global';
      const set = sseClients.get(key);
      if (set) { set.delete(res); if (set.size === 0) sseClients.delete(key); }
    }

    function broadcastSSE(data, targetSessionId) {
      const msg = `data: ${JSON.stringify(data)}\n\n`;
      if (targetSessionId) {
        const set = sseClients.get(targetSessionId);
        if (set) for (const c of set) c.write(msg);
      }
      const global = sseClients.get('global');
      if (global) for (const c of global) c.write(msg);
    }

    function totalSSEClients() {
      let n = 0; for (const s of sseClients.values()) n += s.size; return n;
    }

    const server = http.createServer((req, res) => {
      const url = new URL(req.url, `http://localhost:${PROXY_PORT}`);
      const pathname = url.pathname;

      res.setHeader('Access-Control-Allow-Origin', '*');
      res.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
      res.setHeader('Access-Control-Allow-Headers', 'Content-Type');

      if (req.method === 'OPTIONS') { res.writeHead(204); return res.end(); }

      // Redirects
      if (pathname === '/' || pathname === BASE_PATH) {
        res.writeHead(301, { 'Location': BASE_PATH + '/' });
        return res.end();
      }

      // Wrapper page
      if (pathname === BASE_PATH + '/') {
        res.writeHead(200, { 'Content-Type': 'text/html' });
        return res.end(fs.readFileSync('/scripts/index.html', 'utf8'));
      }

      // Service Worker
      if (pathname === BASE_PATH + '/sw.js') {
        res.writeHead(200, { 'Content-Type': 'application/javascript', 'Service-Worker-Allowed': BASE_PATH + '/' });
        return res.end(fs.readFileSync('/scripts/sw.js', 'utf8'));
      }

      // POST /term/api/notify
      if (pathname === BASE_PATH + '/api/notify' && req.method === 'POST') {
        let body = '';
        req.on('data', c => body += c);
        req.on('end', () => {
          try {
            const data = JSON.parse(body);
            const n = { type: data.type || 'info', message: data.message || '', sessionId: data.sessionId || '', timestamp: new Date().toISOString() };
            notifications.push(n);
            if (notifications.length > 50) notifications.shift();
            broadcastSSE(n, data.sessionId);
            res.writeHead(200, { 'Content-Type': 'application/json' });
            res.end(JSON.stringify({ ok: true }));
          } catch (e) { res.writeHead(400); res.end(JSON.stringify({ error: e.message })); }
        });
        return;
      }

      // GET /term/api/events (SSE)
      if (pathname === BASE_PATH + '/api/events' && req.method === 'GET') {
        const sessionId = url.searchParams.get('sessionId') || '';
        res.writeHead(200, { 'Content-Type': 'text/event-stream', 'Cache-Control': 'no-cache', 'Connection': 'keep-alive' });
        res.write(`data: {"type":"connected","sessionId":"${sessionId}"}\n\n`);
        addSSEClient(sessionId, res);
        req.on('close', () => removeSSEClient(sessionId, res));
        return;
      }

      // GET /term/api/health
      if (pathname === BASE_PATH + '/api/health') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        return res.end(JSON.stringify({ status: 'ok', sseClients: totalSSEClients(), sessions: sseClients.size, notifications: notifications.length }));
      }

      // Proxy everything else to ttyd
      const proxyPath = pathname.replace(BASE_PATH + '/ttyd', '') || '/';
      const fwdHeaders = { ...req.headers };
      delete fwdHeaders['accept-encoding']; // prevent gzip so we can inject scripts
      const proxyReq = http.request({
        hostname: '127.0.0.1', port: TTYD_PORT,
        path: proxyPath + url.search, method: req.method, headers: fwdHeaders
      }, (proxyRes) => {
        const isHtml = (proxyRes.headers['content-type'] || '').includes('text/html');
        const injectScript = isHtml && '{{ .Values.shiftEnterNewline }}' === 'true';
        if (injectScript) {
          // Buffer HTML and inject keybinding script before </body>
          let body = '';
          proxyRes.on('data', c => body += c);
          proxyRes.on('end', () => {
            const script = `<script>
              // Shift+Enter → CSI u sequence for Claude Code multi-line input
              (function poll() {
                if (!window.term) return setTimeout(poll, 100);
                window.term.attachCustomKeyEventHandler(function(e) {
                  if (e.key === 'Enter' && e.shiftKey && e.type === 'keydown') {
                    window.term.input('\\x1b[13;2u');
                    return false;
                  }
                  return true;
                });
              })();
            </script>`;
            body = body.replace('</body>', script + '</body>');
            const headers = { ...proxyRes.headers };
            delete headers['content-encoding'];
            delete headers['transfer-encoding'];
            headers['content-length'] = Buffer.byteLength(body);
            res.writeHead(proxyRes.statusCode, headers);
            res.end(body);
          });
        } else {
          res.writeHead(proxyRes.statusCode, proxyRes.headers);
          proxyRes.pipe(res);
        }
      });
      proxyReq.on('error', (e) => { res.writeHead(502); res.end(`ttyd proxy error: ${e.message}`); });
      req.pipe(proxyReq);
    });

    // WebSocket proxy
    server.on('upgrade', (req, socket, head) => {
      const url = new URL(req.url, `http://localhost:${PROXY_PORT}`);
      const proxyPath = (url.pathname.replace(BASE_PATH + '/ttyd', '') || '/') + url.search;
      const proxyReq = http.request({
        hostname: '127.0.0.1', port: TTYD_PORT, path: proxyPath, method: 'GET',
        headers: { ...req.headers, host: `127.0.0.1:${TTYD_PORT}` }
      });
      proxyReq.on('upgrade', (proxyRes, proxySocket) => {
        let resp = 'HTTP/1.1 101 Switching Protocols\r\n';
        for (const [k, v] of Object.entries(proxyRes.headers)) resp += `${k}: ${v}\r\n`;
        resp += '\r\n';
        socket.write(resp);
        proxySocket.pipe(socket);
        socket.pipe(proxySocket);
        proxySocket.on('error', () => socket.destroy());
        socket.on('error', () => proxySocket.destroy());
      });
      proxyReq.on('error', () => socket.destroy());
      proxyReq.end();
    });

    server.listen(PROXY_PORT, () => console.log(`CloudTTY proxy on :${PROXY_PORT}, ttyd on :${TTYD_PORT}`));

  sw.js: |
    self.addEventListener('message', (event) => {
      const data = event.data;
      if (data.type === 'show-notification') {
        const n = data.notification;
        const notifType = n.type || 'info';
        const message = n.message || '';
        const actions = notifType === 'question'
          ? [{ action: 'view', title: 'View' }]
          : [{ action: 'view', title: 'View' }, { action: 'dismiss', title: 'Dismiss' }];
        self.registration.showNotification(`Claude (${notifType})`, {
          body: message,
          tag: 'cloudtty-' + notifType + '-' + Date.now(),
          requireInteraction: notifType === 'question',
          actions: actions,
          data: { url: event.source?.url || '/' }
        });
      }
    });

    self.addEventListener('notificationclick', (event) => {
      event.notification.close();
      if (event.action === 'dismiss') return;
      event.waitUntil(
        clients.matchAll({ type: 'window', includeUncontrolled: true }).then((clientList) => {
          for (const client of clientList) {
            if (client.url.includes('/term') && 'focus' in client) return client.focus();
          }
          return clients.openWindow(event.notification.data?.url || '/');
        })
      );
    });
