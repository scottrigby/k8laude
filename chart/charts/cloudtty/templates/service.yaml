apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cloudtty
  labels:
    app.kubernetes.io/name: cloudtty
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cloudtty
    app.kubernetes.io/instance: {{ .Release.Name }}
