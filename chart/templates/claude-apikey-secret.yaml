{{- if .Values.claude.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-claude-apikey
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  api-key: {{ .Values.claude.apiKey | b64enc | quote }}
{{- end }}
