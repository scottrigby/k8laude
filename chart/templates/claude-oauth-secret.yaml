{{- if .Values.claude.oauthToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-claude-oauth
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  token: {{ .Values.claude.oauthToken | b64enc | quote }}
{{- end }}
