{{- if and .Values.ingress.enabled (eq .Values.ingress.tls.mode "auto") .Values.ingress.tls.acme.digitalocean.accessToken}}
apiVersion: v1
kind: Secret
metadata:
  name: {{.Release.Name}}-digitalocean
  labels:
    app.kubernetes.io/name: {{.Chart.Name}}
    app.kubernetes.io/instance: {{.Release.Name}}
type: Opaque
stringData:
  access-token: {{.Values.ingress.tls.acme.digitalocean.accessToken | quote}}
{{- end}}
