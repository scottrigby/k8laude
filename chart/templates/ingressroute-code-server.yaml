{{- if and .Values.ingress.enabled (index .Values "code-server" "enabled")}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{.Release.Name}}-code-server
  labels:
    app.kubernetes.io/name: {{.Chart.Name}}
    app.kubernetes.io/instance: {{.Release.Name}}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{.Release.Namespace}}.{{.Values.ingress.host}}`)
      kind: Rule
      services:
        - name: {{.Release.Name}}-code-server
          port: 8080
  tls:
    secretName: {{.Release.Name}}-tls
{{- end}}
