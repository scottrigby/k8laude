{{- if .Values.ingress.enabled}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{.Release.Name}}-app
  labels:
    app.kubernetes.io/name: {{.Chart.Name}}
    app.kubernetes.io/instance: {{.Release.Name}}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{.Release.Namespace}}.{{.Values.ingress.host}}`) && PathPrefix(`/ide`)
      kind: Rule
      services:
        - name: {{.Release.Name}}-code-server
          port: 8080
      {{- if (index .Values "code-server" "enabled")}}
      middlewares:
        - name: {{.Release.Name}}-strip-ide
      {{- end}}
    - match: Host(`{{.Release.Namespace}}.{{.Values.ingress.host}}`)
      kind: Rule
      services:
        - name: {{.Release.Name}}
          port: {{.Values.service.port}}
  tls:
    secretName: {{.Release.Name}}-tls
---
{{- if (index .Values "code-server" "enabled")}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{.Release.Name}}-strip-ide
spec:
  stripPrefix:
    prefixes:
      - /ide
{{- end}}
{{- end}}
