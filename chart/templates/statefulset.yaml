{{- if .Values.persistence.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{.Release.Name}}
  labels:
    app.kubernetes.io/name: {{.Chart.Name}}
    app.kubernetes.io/instance: {{.Release.Name}}
spec:
  serviceName: {{.Release.Name}}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{.Chart.Name}}
      app.kubernetes.io/instance: {{.Release.Name}}
  template:
    metadata:
      annotations:
        checksum/healthcheck: {{ include (print $.Template.BasePath "/healthcheck-config.yaml") . | sha256sum }}
        {{- if .Values.claude.debug.enabled }}
        checksum/fluentbit: {{ include (print $.Template.BasePath "/fluentbit-config.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.claude.oauthToken }}
        checksum/oauth: {{ include (print $.Template.BasePath "/claude-oauth-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.claude.apiKey }}
        checksum/apikey: {{ include (print $.Template.BasePath "/claude-apikey-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if and (hasKey .Values "cloudtty") .Values.cloudtty.enabled }}
        checksum/claude-helpers: {{ include (print $.Template.BasePath "/claude-helpers.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{.Chart.Name}}
        app.kubernetes.io/instance: {{.Release.Name}}
    spec:
      {{- with .Values.imagePullSecrets}}
      imagePullSecrets:
        {{- toYaml . | nindent 8}}
      {{- end}}
      {{- if .Values.postgresql.enabled}}
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command: ["sh", "-c", "until nc -z {{.Release.Name}}-postgresql 5432; do echo 'waiting for postgresql...'; sleep 2; done; echo 'postgresql is ready'"]
      {{- end}}
      containers:
        - name: claude
          image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
          imagePullPolicy: {{.Values.image.pullPolicy}}
          command: ["node", "/opt/healthcheck/healthcheck.js"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PATH
              value: /tmp/cloudtty-bin:/usr/local/share/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: CLAUDE_CONFIG_DIR
              value: {{.Values.claude.configDir}}
            {{- if .Values.claude.oauthToken }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{.Release.Name}}-claude-oauth
                  key: token
            {{- else if .Values.claude.oauthTokenSecret }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{.Values.claude.oauthTokenSecret}}
                  key: token
            {{- end }}
            {{- if .Values.claude.apiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{.Release.Name}}-claude-apikey
                  key: api-key
            {{- else if .Values.claude.apiKeySecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{.Values.claude.apiKeySecret}}
                  key: api-key
            {{- end }}
            {{- if .Values.claude.debug.enabled}}
            - name: CLAUDE_CODE_DEBUG_LOGS_DIR
              value: {{.Values.claude.debug.logFile}}
            {{- end}}
            {{- if .Values.replicated.enabled}}
            - name: REPLICATED_SDK_HOST
              value: {{.Release.Name}}-sdk
            - name: REPLICATED_SDK_PORT
              value: "3000"
            {{- end}}
          ports:
            - name: http
              containerPort: {{.Values.service.port}}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{.Values.service.port}}
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{.Values.service.port}}
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12}}
          {{- if and (hasKey .Values "cloudtty") .Values.cloudtty.enabled }}
          lifecycle:
            postStart:
              exec:
                command: ["/bin/bash", "/opt/claude-helpers/setup-claude.sh"]
          {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: healthcheck
              mountPath: /opt/healthcheck
            {{- if and (hasKey .Values "cloudtty") .Values.cloudtty.enabled }}
            - name: claude-helpers
              mountPath: /opt/claude-helpers
            {{- end }}
            {{- if .Values.claude.credentialsSecret}}
            - name: claude-config
              mountPath: {{.Values.claude.configDir}}
            {{- end}}
            {{- if .Values.claude.debug.enabled}}
            - name: debug-logs
              mountPath: {{.Values.claude.debug.logDir}}
            {{- end}}
        {{- if .Values.claude.debug.enabled}}
        - name: fluentbit
          image: "{{.Values.fluentbit.image.repository}}:{{.Values.fluentbit.image.tag}}"
          volumeMounts:
            - name: debug-logs
              mountPath: {{.Values.claude.debug.logDir}}
              readOnly: true
            - name: fluentbit-config
              mountPath: /fluent-bit/etc
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        {{- end}}
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
        - name: healthcheck
          configMap:
            name: {{.Release.Name}}-healthcheck
        {{- if and (hasKey .Values "cloudtty") .Values.cloudtty.enabled }}
        - name: claude-helpers
          configMap:
            name: {{.Release.Name}}-claude-helpers
            defaultMode: 0755
        {{- end }}
        {{- if .Values.claude.credentialsSecret}}
        - name: claude-config
          secret:
            secretName: {{.Values.claude.credentialsSecret}}
        {{- end}}
        {{- if .Values.claude.debug.enabled}}
        - name: debug-logs
          emptyDir: {}
        - name: fluentbit-config
          configMap:
            name: {{.Release.Name}}-fluentbit
        {{- end}}
{{- end }}
