apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: k8laude
spec:
  chart:
    name: k8laude
    chartVersion: ""

  helmUpgradeFlags:
    - --timeout
    - 5m
    - --wait

  values:
    replicated:
      enabled: true
      nameOverride: k8laude-sdk
    image:
      repository: '{{repl ReplicatedImageName "ghcr.io/scottrigby/k8laude" }}'
      tag: latest
      pullPolicy: Always
    imagePullSecrets:
      - name: '{{repl ImagePullSecretName }}'
      - name: enterprise-pull-secret
    fluentbit:
      image:
        repository: '{{repl ReplicatedImageName "docker.io/fluent/fluent-bit" }}'
        tag: "3.2"
    postgresql:
      image:
        registry: '{{repl ReplicatedImageRegistry "docker.io" }}'
        repository: '{{repl ReplicatedImageRepository "bitnamilegacy/postgresql" }}'
    global:
      security:
        allowInsecureImages: true
    ingress:
      enabled: false
    cert-manager:
      enabled: false
    traefik:
      enabled: false
    claude:
      oauthToken: '{{repl ConfigOption "oauth_token" }}'
      apiKey: '{{repl ConfigOption "api_key" }}'
    externalDatabase:
      host: '{{repl ConfigOption "external_db_host" }}'
      port: '{{repl ConfigOption "external_db_port" }}'
      username: '{{repl ConfigOption "external_db_username" }}'
      password: '{{repl ConfigOption "external_db_password" }}'
      database: '{{repl ConfigOption "external_db_name" }}'
    cloudtty:
      auth:
        password: '{{repl ConfigOption "cloudtty_auth_password" }}'
      image:
        repository: '{{repl ReplicatedImageName "ghcr.io/scottrigby/k8laude-cloudtty" }}'
        tag: latest
        pullPolicy: Always
    code-server:
      password: '{{repl ConfigOption "code_server_password" }}'
      image:
        repository: '{{repl ReplicatedImageName "ghcr.io/scottrigby/k8laude-code-server" }}'
        tag: latest
        pullPolicy: Always

  # Use optionalValues for boolean toggles — avoids non-bool string issues
  optionalValues:
    - when: '{{repl ConfigOptionEquals "cloudtty_enabled" "1" }}'
      recursiveMerge: true
      values:
        cloudtty:
          enabled: true
    - when: '{{repl not (ConfigOptionEquals "cloudtty_enabled" "1") }}'
      recursiveMerge: true
      values:
        cloudtty:
          enabled: false
    - when: '{{repl ConfigOptionEquals "code_server_enabled" "1" }}'
      recursiveMerge: true
      values:
        code-server:
          enabled: true
    - when: '{{repl not (ConfigOptionEquals "code_server_enabled" "1") }}'
      recursiveMerge: true
      values:
        code-server:
          enabled: false
    - when: '{{repl ConfigOptionEquals "debug_logging_enabled" "1" }}'
      recursiveMerge: true
      values:
        claude:
          debug:
            enabled: true
    - when: '{{repl not (ConfigOptionEquals "debug_logging_enabled" "1") }}'
      recursiveMerge: true
      values:
        claude:
          debug:
            enabled: false
    - when: '{{repl and (ConfigOptionEquals "debug_logging_enabled" "1") (ConfigOptionEquals "debug_log_storage" "builtin") }}'
      recursiveMerge: true
      values:
        postgresql:
          enabled: true
          auth:
            password: '{{repl ConfigOption "embedded_db_password" }}'
    - when: '{{repl not (and (ConfigOptionEquals "debug_logging_enabled" "1") (ConfigOptionEquals "debug_log_storage" "builtin")) }}'
      recursiveMerge: true
      values:
        postgresql:
          enabled: false

  namespace: '{{repl Namespace }}'
  builder:
    replicated:
      enabled: true
