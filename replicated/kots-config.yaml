apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: k8laude-config
spec:
  groups:
    - name: authentication
      title: Authentication
      description: Configure how Claude Code authenticates with Anthropic.
      items:
        - name: auth_method
          title: Authentication Method
          type: select_one
          default: oauth
          items:
            - name: oauth
              title: OAuth Token (Subscription)
            - name: apikey
              title: API Key (Console)
          help_text: |
            OAuth Token requires a Claude Pro/Max/Team/Enterprise subscription.
            Generate with: claude setup-token
            API Key uses Anthropic Console billing.
            Get one at: console.anthropic.com/settings/keys
        - name: oauth_token
          title: OAuth Token
          type: password
          when: '{{repl ConfigOptionEquals "auth_method" "oauth" }}'
          help_text: |
            Long-lived OAuth token from Claude Code subscription.
            Generate once with 'claude setup-token' and paste here.
        - name: api_key
          title: Anthropic API Key
          type: password
          when: '{{repl ConfigOptionEquals "auth_method" "apikey" }}'
          help_text: |
            API key from console.anthropic.com/settings/keys.
            Billed per-token via Anthropic Console.
    - name: database
      title: Database
      description: PostgreSQL database for k8laude data storage (debug logs, future features).
      items:
        - name: postgresql_enabled
          title: Enable PostgreSQL
          type: bool
          default: '{{repl ConfigOptionEquals "debug_logging_enabled" "1" }}'
          help_text: |
            Deploy a PostgreSQL database for k8laude. Required when debug logging
            is enabled. Can also be enabled independently for other data storage needs.
        - name: db_type
          title: Database Type
          type: select_one
          default: embedded
          when: '{{repl ConfigOptionEquals "postgresql_enabled" "1" }}'
          items:
            - name: embedded
              title: Embedded PostgreSQL
            - name: external
              title: External PostgreSQL
          help_text: |
            Embedded: PostgreSQL runs inside the cluster (recommended for single-node).
            External: Connect to an existing PostgreSQL server.
        - name: external_db_host
          title: Host
          type: text
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "external") }}'
          help_text: "Hostname or IP of the external PostgreSQL server."
          validation:
            regex:
              pattern: "^[a-zA-Z0-9][a-zA-Z0-9.-]+$"
              message: "Must be a valid hostname (letters, numbers, dots, hyphens)."
        - name: external_db_port
          title: Port
          type: text
          default: "5432"
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "external") }}'
          help_text: "PostgreSQL port (default: 5432)."
        - name: external_db_username
          title: Username
          type: text
          default: k8laude
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "external") }}'
          help_text: "PostgreSQL username for k8laude."
        - name: external_db_password
          title: Password
          type: password
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "external") }}'
          help_text: "PostgreSQL password."
        - name: external_db_name
          title: Database Name
          type: text
          default: k8laude
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "external") }}'
          help_text: "PostgreSQL database name."
        - name: embedded_db_password
          title: Embedded Database Password
          type: password
          hidden: true
          default: '{{repl RandomString 24 }}'
          when: '{{repl and (ConfigOptionEquals "postgresql_enabled" "1") (ConfigOptionEquals "db_type" "embedded") }}'
          help_text: "Auto-generated password for embedded PostgreSQL. Persists across upgrades."
    - name: features
      title: Features
      description: Enable or disable optional k8laude features.
      items:
        - name: cloudtty_enabled
          title: Browser Terminal (CloudTTY)
          type: bool
          default: "1"
          help_text: |
            Enable the browser-based terminal for Claude Code access via web browser.
            When disabled, the cloudtty Deployment is not created. Users access Claude
            Code via kubectl exec:
              kubectl -n <namespace> exec -it statefulset/k8laude -- claude --dangerously-skip-permissions
        - name: cloudtty_auth_password
          title: Terminal Password
          type: password
          default: k8laude
          when: '{{repl ConfigOptionEquals "cloudtty_enabled" "1" }}'
          help_text: |
            Basic auth password for the browser terminal. Username is 'k8laude'.
            Set a strong password for production deployments.
        - name: code_server_enabled
          title: Web IDE (code-server)
          type: bool
          default: "1"
          help_text: |
            Enable the browser-based VS Code IDE for editing workspace files.
            When disabled, the code-server Deployment is not created. Users can use
            their own local IDE or tools to work with files in the shared workspace volume.
        - name: code_server_password
          title: IDE Password
          type: password
          default: k8laude
          when: '{{repl ConfigOptionEquals "code_server_enabled" "1" }}'
          help_text: |
            Password for the browser-based VS Code IDE.
            Set a strong password for production deployments.
        - name: debug_logging_enabled
          title: Debug Logging
          type: bool
          default: "1"
          help_text: |
            Enable Claude Code debug log collection. When enabled, Claude runs with
            --debug --verbose flags, a Fluent Bit sidecar ships logs to PostgreSQL,
            and the Database section above configures storage.
            When disabled, no debug logs are collected and the Fluent Bit sidecar
            is not created. PostgreSQL can still be enabled independently above.
        - name: voice_mode_enabled
          title: Voice Mode
          type: bool
          default: "0"
          when: '{{repl LicenseFieldValue "voice_mode_enabled" }}'
          help_text: |
            Enable voice interaction with Claude Code.
            This option is only available when the voice_mode_enabled entitlement
            is present on your license. Contact your account team to add this
            entitlement to your license.
