apiVersion: troubleshoot.sh/v1beta2
kind: SupportBundle
metadata:
  name: k8laude-support-bundle
spec:
  collectors:
    - clusterInfo: {}
    - clusterResources: {}
    # Log collection: k8laude app
    - logs:
        name: k8laude/app
        selector:
          - app.kubernetes.io/name=k8laude
        namespace: '{{repl Namespace }}'
        limits:
          maxLines: 10000
          maxAge: 720h
    # Log collection: PostgreSQL
    - logs:
        name: postgresql/logs
        selector:
          - app.kubernetes.io/name=postgresql
        namespace: '{{repl Namespace }}'
        limits:
          maxLines: 10000
          maxAge: 720h
    # Log collection: code-server
    - logs:
        name: code-server/logs
        selector:
          - app.kubernetes.io/name=code-server
        namespace: '{{repl Namespace }}'
        limits:
          maxLines: 5000
          maxAge: 720h
    # Log collection: Replicated SDK
    - logs:
        name: replicated-sdk/logs
        selector:
          - app.kubernetes.io/name=replicated
        namespace: '{{repl Namespace }}'
        limits:
          maxLines: 5000
          maxAge: 720h
    # Health endpoint check
    - http:
        collectorName: k8laude-health
        get:
          url: 'http://k8laude.{{repl Namespace }}.svc.cluster.local:3000/healthz'
          timeout: 10s
  analyzers:
    # Health endpoint analysis
    - textAnalyze:
        checkName: k8laude health endpoint
        fileName: k8laude-health.json
        regex: '"status":\s*"ok"'
        outcomes:
          - fail:
              when: "false"
              message: "k8laude health check failed."
          - pass:
              when: "true"
              message: "k8laude health endpoint is responding normally."
    # StatefulSet status: k8laude
    - statefulsetStatus:
        name: k8laude
        namespace: '{{repl Namespace }}'
        outcomes:
          - fail:
              when: "< 1"
              message: "k8laude StatefulSet has no ready replicas. The Claude Code workspace is unavailable."
          - pass:
              message: "k8laude StatefulSet is healthy."
    # StatefulSet status: PostgreSQL
    - statefulsetStatus:
        name: k8laude-postgresql
        namespace: '{{repl Namespace }}'
        outcomes:
          - fail:
              when: "< 1"
              message: "PostgreSQL is not running. Debug log storage is unavailable."
          - pass:
              message: "PostgreSQL StatefulSet is healthy."
    # Deployment status: code-server
    - deploymentStatus:
        name: k8laude-code-server
        namespace: '{{repl Namespace }}'
        outcomes:
          - fail:
              when: "< 1"
              message: "code-server has no ready replicas. The web IDE is unavailable."
          - pass:
              message: "code-server Deployment is healthy."
    # App-specific failure: authentication errors
    - textAnalyze:
        checkName: Claude Code authentication errors
        fileName: k8laude/app/*/claude.log
        regex: "Invalid API Key|oauth.*token.*expired|authentication.*failed|401.*Unauthorized"
        ignoreIfNoFiles: true
        outcomes:
          - fail:
              when: "true"
              message: "Claude Code authentication errors detected. Check API key or OAuth token."
          - pass:
              when: "false"
              message: "No authentication errors detected."
    # App-specific failure: PostgreSQL connection errors
    - textAnalyze:
        checkName: PostgreSQL connection errors
        fileName: k8laude/app/*/claude.log
        regex: "ECONNREFUSED.*5432|connection refused.*postgresql"
        ignoreIfNoFiles: true
        outcomes:
          - fail:
              when: "true"
              message: "PostgreSQL connection errors detected. Check database status."
          - pass:
              when: "false"
              message: "No PostgreSQL connection errors detected."
    # Storage class
    - storageClass:
        checkName: Default storage class available
        outcomes:
          - fail:
              message: "No default storage class found."
          - pass:
              message: "Default storage class is available."
    # Node readiness
    - nodeResources:
        checkName: All nodes are Ready
        outcomes:
          - fail:
              when: "nodeCondition(Ready) == False"
              message: "One or more nodes are not Ready."
          - fail:
              when: "nodeCondition(Ready) == Unknown"
              message: "Node Ready status is Unknown."
          - pass:
              message: "All nodes are Ready."
